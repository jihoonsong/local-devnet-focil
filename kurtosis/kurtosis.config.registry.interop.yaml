participants_matrix:
  el:
    - el_type: besu
      el_image: ethpandaops/besu:focil
    - el_type: ethrex
      el_image: ethpandaops/ethrex:focil
  cl:
    - cl_type: lodestar
      cl_image: ethpandaops/lodestar:focil
      supernode: true
network_params:
  gloas_fork_epoch: 0
  heze_fork_epoch: 1
  preset: mainnet
additional_services:
  - dora
  - tx_fuzz
  - spamoor
dora_params:
  image: bbusa/dora:focil
port_publisher:
  additional_services:
    enabled: true
    public_port_start: 65500
spamoor_params:
  spammers:
    - scenario: eoatx
      config:
        throughput: 100
    - scenario: uniswap-swaps
      config:
        throughput: 100
    - scenario: blob-combined
      config:
        throughput: 5
